name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format
        run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    name: Type Check
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Mypy
        run: uv run mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.13"]
    name: Unit Tests (Python ${{ matrix.python }})
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ --tb=short -q

  evals:
    runs-on: ubuntu-latest
    name: LLM Evals
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev --extra eval

      - name: Run evals
        if: env.OPENAI_API_KEY != ''
        run: uv run pytest tests/evals/ -m eval --tb=short -v
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Skip evals (no API key)
        if: env.OPENAI_API_KEY == ''
        run: echo "::notice::Skipping evals — OPENAI_API_KEY secret not configured"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
