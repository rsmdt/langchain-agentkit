# Redirect package: langchain-skillkit → langchain-agentkit
#
# Publish with:
#   uv build --config-file pyproject-skillkit.toml
#   uv publish dist/langchain_skillkit-*
#
# This publishes a thin package that depends on langchain-agentkit.
# Existing users with `pip install langchain-skillkit` get the new
# package automatically. The compat shim (langchain_skillkit import
# path) is shipped by langchain-agentkit itself.

[project]
name = "langchain-skillkit"
version = "0.4.0"
description = "Deprecated — use langchain-agentkit instead."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "langchain-agentkit>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = []
